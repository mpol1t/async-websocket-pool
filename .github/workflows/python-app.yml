name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  pre-commit:
    name: pre-commit (lint/format/type/etc.)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry + pre-commit
        run: |
          python -m pip install --upgrade pip
          pipx install poetry
          pip install pre-commit

      # Optional but speeds up installs on repeat CI runs
      - name: Cache Poetry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/pypoetry
            ~/.cache/pip
          key: poetry-${{ runner.os }}-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            poetry-${{ runner.os }}-

      - name: Install project dependencies (poetry)
        run: |
          poetry install --no-interaction --no-root

      # Runs the exact hooks defined in .pre-commit-config.yaml
      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1
        with:
          extra_args: --all-files

  tests:
    name: tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          pipx install poetry

      - name: Cache Poetry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/pypoetry
            ~/.cache/pip
          key: poetry-${{ runner.os }}-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            poetry-${{ runner.os }}-

      - name: Install project dependencies (poetry)
        run: |
          poetry install --no-interaction --no-root

      - name: Run tests
        run: |
          poetry run pytest -q

      - name: Generate coverage report
        if: matrix.python-version == '3.11'
        run: |
          poetry run pytest --cov async_websocket_pool/ --cov-report xml --cov-fail-under=95

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: false
